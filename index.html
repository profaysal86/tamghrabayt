<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تمغربيت</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .contact {
      margin-top: 20px;
    }

    a {
      display: block;
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      background: #25D366;
      transition: 0.3s;
    }

    a.phone {
      background: #007BFF;
    }

    a:hover {
      opacity: 0.8;
    }

    .small {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>تمغربيت</h1>
    <p>الموقع قريبا إن شاء الله</p>

    <div class="contact">
      <a class="phone" href="tel:+212600000000">📞 اتصال مباشر</a>
      <a href="https://wa.me/212600000000" target="_blank">💬 واتساب</a>
    </div>

    <div class="small">
      نعمل على تطوير الموقع بعناية ليقدم تجربة موثوقة وقوية.
    </div>
  </div>

</body>
</html>
