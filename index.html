<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamghrabayt</title>

<style>
:root {
  --primary: #0f172a;
  --accent: #22c55e;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: #f1f5f9;
}

/* HERO */
.hero {
  height: 90vh;
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c');
  background-size: cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #fff;
  flex-direction: column;
}

.hero h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

.hero p {
  margin-bottom: 20px;
}

.search-box {
  display: flex;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  width: 60%;
}

.search-box input {
  flex: 1;
  padding: 15px;
  border: none;
}

.search-box button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 15px 25px;
  cursor: pointer;
}

/* SECTION */
.section {
  padding: 60px 20px;
  text-align: center;
}

/* AI BOX */
.ai-container {
  max-width: 700px;
  margin: auto;
  background: white;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.chat-box {
  height: 200px;
  overflow-y: auto;
  text-align: left;
  margin-bottom: 15px;
}

.msg {
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
}

.user {
  background: #dbeafe;
}

.ai {
  background: #dcfce7;
}

.ai-input {
  display: flex;
}

.ai-input input {
  flex: 1;
  padding: 12px;
}

.ai-input button {
  background: var(--primary);
  color: white;
  border: none;
  padding: 12px;
}

/* PROPERTIES */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  width: 280px;
  background: white;
  margin: 15px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-body {
  padding: 15px;
}

/* CTA */
.cta {
  background: var(--primary);
  color: white;
  text-align: center;
  padding: 60px 20px;
}

.cta a {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 25px;
  background: var(--accent);
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

/* RESPONSIVE */
@media(max-width:768px){
  .search-box {
    width: 90%;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>لقّى العقار المناسب فالقنيطرة</h1>
  <p>شراء، بيع، استثمار — بقرارات مبنية على معطيات حقيقية</p>

  <div class="search-box">
    <input placeholder="فين باغي تسكن؟">
    <button>بحث</button>
  </div>
</section>

<!-- AI -->
<section class="section">
  <h2>الذكاء العقاري</h2>

  <div class="ai-container">
    <div class="chat-box" id="chat"></div>

    <div class="ai-input">
      <input id="input" placeholder="سول على العقار...">
      <button onclick="send()">إرسال</button>
    </div>
  </div>
</section>

<!-- PROPERTIES -->
<section class="section">
  <h2>عروض مختارة</h2>

  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
      <div class="card-body">
        <h3>شقة فميموزا</h3>
        <p>850,000 درهم</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be">
      <div class="card-body">
        <h3>فيلا فبئر الرامي</h3>
        <p>2,500,000 درهم</p>
      </div>
    </div>
  </div>
</section>

<!-- CTA -->
<section class="cta">
  <h2>باغي تشري ولا تبيع؟</h2>
  <p>تواصل معنا مباشرة</p>
  <a href="https://wa.me/+212649989742">واتساب</a>
</section>

<script>
function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const res = await fetch("http://localhost:3000/ask", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ question: text })
  });

  const data = await res.json();
  addMessage(data.answer, "ai");
}
</script>

</body>
</html>
