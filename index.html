<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="تمغربيت - تحليل عقاري ذكي يساعدك تختار العقار المناسب لك قبل الشراء">
<title>تمغربيت | منصة عقارية ذكية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: rgba(201,168,76,0.18);
    --green: #25D366;
    --green-dark: #1aad53;
    --blue: #2563EB;
    --blue-dark: #1d4ed8;
    --yellow: #F59E0B;
    --yellow-dark: #D97706;
    --white: #FFFFFF;
    --cream: #F9F4EC;
    --text-main: #F0EAD6;
    --text-sub: rgba(240,234,214,0.75);
    --overlay-start: rgba(5,10,20,0.55);
    --overlay-end: rgba(5,10,20,0.82);
  }

  html, body {
    min-height: 100%;
    font-family: 'Cairo', 'Tajawal', sans-serif;
    background: #050A14;
    color: var(--white);
    overflow-x: hidden;
  }

  /* ─── Hero Section ─── */
  .hero {
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1.25rem 3rem;
    overflow: hidden;
  }

  /* Animated background using CSS gradient (placeholder for image) */
  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=1800&q=80') center center / cover no-repeat;
    transform: scale(1.05);
    animation: bgZoom 20s ease-in-out infinite alternate;
    z-index: 0;
  }

  @keyframes bgZoom {
    from { transform: scale(1.05); }
    to   { transform: scale(1.12); }
  }

  /* Gradient overlay */
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      170deg,
      var(--overlay-start) 0%,
      rgba(5,10,20,0.70) 40%,
      var(--overlay-end) 100%
    );
    z-index: 1;
  }

  /* Decorative radial glow */
  .hero-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 55% at 50% 40%, rgba(201,168,76,0.12) 0%, transparent 70%);
    z-index: 2;
    pointer-events: none;
  }

  .hero-content {
    position: relative;
    z-index: 10;
    max-width: 780px;
    width: 100%;
    animation: fadeUp 1s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(36px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── Logo / Badge ─── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 50px;
    padding: 0.35rem 1rem;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.06em;
    margin-bottom: 1.6rem;
    backdrop-filter: blur(6px);
    animation: fadeUp 1s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  }
  .badge-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 6px var(--gold);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; box-shadow:0 0 6px var(--gold); }
    50%      { opacity:0.5; box-shadow:0 0 2px var(--gold); }
  }

  /* ─── Title ─── */
  .hero-title {
    font-family: 'Tajawal', sans-serif;
    font-size: clamp(3.2rem, 10vw, 6.5rem);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--white);
    margin-bottom: 0.3rem;
    animation: fadeUp 1s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    text-shadow: 0 2px 40px rgba(0,0,0,0.5);
  }

  .hero-title span {
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 60%, #a07830 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ─── Divider ─── */
  .divider {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 1.1rem auto 1.5rem;
    border-radius: 2px;
    animation: fadeUp 1s 0.3s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* ─── Subtitle ─── */
  .hero-subtitle {
    font-size: clamp(1.05rem, 2.8vw, 1.35rem);
    font-weight: 400;
    color: var(--text-main);
    line-height: 1.75;
    max-width: 600px;
    margin: 0 auto 0.6rem;
    animation: fadeUp 1s 0.35s cubic-bezier(0.22,1,0.36,1) both;
  }

  .hero-tagline {
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    font-weight: 500;
    color: var(--gold-light);
    opacity: 0.9;
    margin-bottom: 2.5rem;
    animation: fadeUp 1s 0.45s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* ─── Buttons ─── */
  .btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 2.5rem;
    animation: fadeUp 1s 0.55s cubic-bezier(0.22,1,0.36,1) both;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.85rem 1.8rem;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.18s ease;
    border-radius: inherit;
  }

  .btn:hover::after {
    background: rgba(255,255,255,0.12);
  }

  .btn:hover {
    transform: translateY(-3px);
  }
  .btn:active {
    transform: translateY(0px);
  }

  /* WhatsApp */
  .btn-whatsapp {
    background: linear-gradient(135deg, #25D366 0%, #1aad53 100%);
    color: #fff;
    box-shadow: 0 6px 24px rgba(37,211,102,0.38);
  }
  .btn-whatsapp:hover {
    box-shadow: 0 10px 32px rgba(37,211,102,0.52);
    filter: brightness(1.06);
  }

  /* Call */
  .btn-call {
    background: linear-gradient(135deg, #3B82F6 0%, #1d4ed8 100%);
    color: #fff;
    box-shadow: 0 6px 24px rgba(59,130,246,0.38);
  }
  .btn-call:hover {
    box-shadow: 0 10px 32px rgba(59,130,246,0.52);
    filter: brightness(1.06);
  }

  /* Links */
  .btn-links {
    background: linear-gradient(135deg, #FBBF24 0%, #D97706 100%);
    color: #1a0f00;
    box-shadow: 0 6px 24px rgba(251,191,36,0.38);
  }
  .btn-links:hover {
    box-shadow: 0 10px 32px rgba(251,191,36,0.52);
    filter: brightness(1.06);
  }

  .btn svg {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
  }

  /* ─── Contact strip ─── */
  .contact-strip {
    display: inline-flex;
    align-items: center;
    gap: 0.7rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 0.75rem 1.5rem;
    backdrop-filter: blur(8px);
    animation: fadeUp 1s 0.65s cubic-bezier(0.22,1,0.36,1) both;
  }

  .contact-label {
    font-size: 0.88rem;
    color: var(--text-sub);
    font-weight: 400;
  }

  .contact-number {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.04em;
    direction: ltr;
  }

  .contact-icon {
    width: 18px; height: 18px;
    color: var(--gold);
    flex-shrink: 0;
  }

  /* ─── Floating decorative lines ─── */
  .deco-line {
    position: absolute;
    pointer-events: none;
    z-index: 3;
  }
  .deco-line-1 {
    top: 12%; right: 8%;
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4));
    transform: rotate(-30deg);
  }
  .deco-line-2 {
    bottom: 20%; left: 6%;
    width: 80px; height: 1px;
    background: linear-gradient(90deg, rgba(201,168,76,0.3), transparent);
    transform: rotate(20deg);
  }
  .deco-corner {
    position: absolute;
    width: 60px; height: 60px;
    border-color: rgba(201,168,76,0.25);
    border-style: solid;
    z-index: 3;
    pointer-events: none;
  }
  .deco-corner-tl { top: 5%; right: 5%; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .deco-corner-br { bottom: 8%; left: 4%; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

  /* ─── Stats row ─── */
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    margin-top: 2.8rem;
    flex-wrap: wrap;
    animation: fadeUp 1s 0.75s cubic-bezier(0.22,1,0.36,1) both;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.15rem;
  }
  .stat-num {
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--gold-light);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.75rem;
    color: var(--text-sub);
    font-weight: 400;
  }
  .stat-sep {
    width: 1px;
    background: rgba(255,255,255,0.15);
    align-self: stretch;
  }

  /* ─── Scroll indicator ─── */
  .scroll-hint {
    position: absolute;
    bottom: 1.8rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    opacity: 0.5;
    animation: fadeUp 1.2s 1s cubic-bezier(0.22,1,0.36,1) both;
  }
  .scroll-hint span {
    font-size: 0.7rem;
    color: var(--text-sub);
    letter-spacing: 0.1em;
  }
  .scroll-arrow {
    width: 18px; height: 18px;
    border-right: 2px solid var(--gold);
    border-bottom: 2px solid var(--gold);
    transform: rotate(45deg);
    animation: scrollBounce 1.6s ease-in-out infinite;
  }
  @keyframes scrollBounce {
    0%,100% { transform: rotate(45deg) translateY(0); }
    50%      { transform: rotate(45deg) translateY(6px); }
  }

  /* ─── Responsive ─── */
  @media (max-width: 600px) {
    .hero { padding: 2rem 1rem 4rem; }
    .btn { padding: 0.8rem 1.3rem; font-size: 0.95rem; }
    .btn-group { gap: 0.75rem; }
    .stats-row { gap: 1.2rem; }
    .stat-sep { display: none; }
    .deco-corner-tl, .deco-corner-br { display: none; }
    .contact-strip { padding: 0.65rem 1rem; }
  }
</style>
</head>
<body>
