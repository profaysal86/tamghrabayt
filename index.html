<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تمغربيت</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: #0f2027;
  color: white;
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  background:
    linear-gradient(rgba(10,20,30,0.85), rgba(10,20,30,0.95)),
    url('hero.png') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 20px;
}

/* النص */
.content {
  position: relative;
  z-index: 2;
  max-width: 550px;
  text-align: right;
}

/* العنوان */
h1 {
  font-size: 52px;
  margin-bottom: 10px;
  color: #f5c16c;
}

/* النص */
p {
  font-size: 18px;
  line-height: 1.7;
  opacity: 0.9;
}

/* الأزرار */
.buttons {
  margin-top: 20px;
}

.buttons a {
  display: inline-block;
  margin: 5px;
  padding: 12px 18px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  transition: 0.3s;
}

.phone { background: #007BFF; }
.whatsapp { background: #25D366; }

.buttons a:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

/* صورتك */
.hero-img {
  position: absolute;
  bottom: 0;
  right: 8%;
  width: 380px;
  opacity: 0.95;

  /* دمج الصورة مع الخلفية */
  mask-image: linear-gradient(to top, transparent 10%, black 65%);
  -webkit-mask-image: linear-gradient(to top, transparent 10%, black 65%);

  filter: brightness(0.95) contrast(1.05);

  transform: translateY(80px);
  animation: riseUp 1.5s ease forwards;
}

/* animation */
@keyframes riseUp {
  to {
    transform: translateY(0);
  }
}

/* الموبايل */
@media (max-width: 768px) {

  .hero {
    flex-direction: column;
  }

  .hero-img {
    position: relative;
    width: 240px;
    right: auto;
    margin-top: 20px;
    transform: translateY(80px);
  }

  .content {
    text-align: center;
  }

  h1 {
    font-size: 36px;
  }
}

</style>
</head>

<body>

<div class="hero">

  <!-- النص -->
  <div class="content">
    <h1>تمغربيت</h1>

    <p>
      منصة عقارية قيد الإنشاء بمدينة القنيطرة<br>
      نعمل على تطوير أدوات للتحليل العقاري ومواكبة المستثمرين<br>
      مشروع يعتمد على المعطيات الدقيقة واتخاذ القرار الذكي
    </p>

    <div class="buttons">
      <a class="phone" href="tel:+212649989742">📞 اتصال</a>
      <a class="whatsapp" href="https://wa.me/212649989742">💬 واتساب</a>
    </div>
  </div>

  <!-- صورتك -->
  <img src="faysal.PNG" class="hero-img">

</div>

</body>
</html>
