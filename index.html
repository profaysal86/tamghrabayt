<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تمغربيت | Tamghrabayt</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      color: white;
    }

    .hero {
      height: 100vh;
      background: url('hero.png') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      position: relative;
    }

    /* Overlay باش تبان الكتابة */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
    }

    .content {
      position: relative;
      z-index: 2;
      max-width: 700px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    .btn {
      padding: 14px 22px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    .whatsapp {
      background: #25D366;
    }

    .call {
      background: #3b82f6;
    }

    .links {
      background: #facc15;
      color: black;
    }

    .btn:hover {
      opacity: 0.8;
    }

    .contact {
      font-size: 16px;
      margin-top: 10px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <div class="hero">
    <div class="content">

      <h1>تمغربيت</h1>

      <p>
        تحليل عقاري ذكي يساعدك تختار العقار المناسب لك قبل الشراء<br>
        موقع عقاري شامل برؤية مختلفة
      </p>

      <div class="buttons">
        <a href="https://wa.me/212649989742" target="_blank" class="btn whatsapp">واتساب</a>
        <a href="tel:+212649989742" class="btn call">اتصال مباشر</a>
        <a href="https://linktr.ee/Tamghrabayt" target="_blank" class="btn links">جميع الروابط</a>
      </div>

      <div class="contact">
        للاستفسار أو الزيارة:<br>
        📞 <strong>+212 649 989 742</strong>
      </div>

    </div>
  </div>

</body>
</html>
