<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تمغربيت - العقار الذكي</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --gold: #c9a55c;
      --navy: #1a2a44;
      --white-glass: rgba(255, 255, 255, 0.15);
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Cairo', sans-serif;
      overflow: hidden;
    }

    /* الخلفية الديناميكية من Unsplash للعقارات الحديثة */
    .hero-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
      background-size: cover;
      background-position: center;
      transition: transform 10s ease-out; /* حركة بطيئة للخلفية */
      z-index: -1;
    }

    body:hover .hero-bg {
      transform: scale(1.1); /* تأثير زووم عند حركة الماوس */
    }

    .main-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: radial-gradient(circle, transparent, rgba(0,0,0,0.5));
    }

    /* الحاوية الزجاجية */
    .glass-card {
      background: var(--white-glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      max-width: 450px;
      width: 90%;
      animation: fadeIn 1.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-placeholder {
      font-size: 50px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 5px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .status-tag {
      display: inline-block;
      background: var(--gold);
      color: #000;
      padding: 5px 20px;
      border-radius: 50px;
      font-weight: bold;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .service-list {
      list-style: none;
      padding: 0;
      margin: 25px 0;
      text-align: right;
    }

    .service-list li {
      color: #fff;
      margin-bottom: 12px;
      font-size: 16px;
      display: flex;
      align-items: center;
    }

    .service-list li::before {
      content: '✓';
      color: var(--gold);
      margin-left: 10px;
      font-weight: bold;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      text-decoration: none;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #fff;
    }

    .btn-whatsapp { background: #25D366; }
    .btn-tel { background: #007BFF; }
    .btn-links { border: 2px solid var(--gold); color: var(--gold); }

    .btn:hover {
      transform: scale(1.03);
      filter: brightness(1.1);
    }

    .footer-text {
      margin-top: 25px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>

  <div class="hero-bg"></div>

  <div class="main-wrapper">
    <div class="glass-card">
      <div class="logo-placeholder">تمغربيت</div>
      <div class="status-tag">قريباً في القنيطرة</div>
      
      <p style="color: #eee;">منصة تحليل العقار الأكثر دقة</p>

      <ul class="service-list">
        <li>تحليل مبني على الأرقام الحقيقية</li>
        <li>معطيات دقيقة من قلب السوق</li>
        <li>قرارات عقارية واضحة ومدروسة</li>
      </ul>

      <div class="btn-group">
        <a href="https://wa.me/212649989742" class="btn btn-whatsapp">واتساب مباشر</a>
        <a href="tel:+212649989742" class="btn btn-tel">اتصل بنا الآن</a>
        <a href="https://linktr.ee/Tamghrabayt" class="btn btn-links">كل الروابط</a>
      </div>

      <div class="footer-text">
        نطور التجربة العقارية الرقمية بالمغرب
      </div>
    </div>
  </div>

  <script>

      'https://images.unsplash.com/photo-1512917774080-9991f1c4c750',
      'https://images.unsplash.com/photo-1600585154340-be6161a56a0c',
      'https://images.unsplash.com/photo-1600607687940-47a0028d95c5'
    ];
    
    // لجعل الموقع أكثر تفاعلاً، يمكننا تغيير الخلفية برمجياً

  </script>

</body>
</html>
