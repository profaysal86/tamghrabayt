<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تمغربيت - موقع يفهم احتياجاتك العقارية</title>

<style>
body {
  font-family: Arial;
  background: #0b1120;
  color: white;
  margin: 0;
}

/* HEADER */
header {
  padding: 15px 30px;
  background: #060d1a;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  color: gold;
  font-weight: bold;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 28px;
}

.btn {
  padding: 10px 20px;
  border-radius: 8px;
  text-decoration: none;
  display: inline-block;
  margin: 5px;
}

.btn-whatsapp { background: #25D366; color: white; }
.btn-call { background: gold; color: black; }

/* SEARCH */
.search {
  background: #111827;
  padding: 20px;
  text-align: center;
}

select, button {
  padding: 10px;
  margin: 5px;
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 10px;
}

.card h3 { margin: 10px 0; }

.price { color: gold; }

.tag {
  font-size: 12px;
  background: rgba(255,215,0,0.2);
  padding: 4px 8px;
  border-radius: 6px;
}

/* FLOAT BUTTON */
.float-whatsapp {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #25D366;
  padding: 12px 15px;
  border-radius: 50px;
  color: white;
  text-decoration: none;
}

</style>
</head>

<body>

<header>
  <div class="logo">تمغربيت</div>
</header>

<section class="hero">
  <h1>موقع يفهم احتياجاتك العقارية قبل ما تختار</h1>
  <p>نحللو السوق ونقترحو عليك الأفضل</p>

  <a href="https://wa.me/212649989742" class="btn btn-whatsapp">واتساب</a>
  <a href="tel:+212649989742" class="btn btn-call">اتصال</a>
</section>

<section class="search">
  <select id="type">
    <option value="">نوع العقار</option>
    <option value="شقة">شقة</option>
    <option value="فيلا">فيلا</option>
  </select>

  <select id="price">
    <option value="">الثمن</option>
    <option value="low">أقل من 1M</option>
    <option value="high">أكثر من 1M</option>
  </select>

  <button onclick="filter()">بحث ذكي</button>
</section>

<section class="grid" id="properties">

  <div class="card" data-type="شقة" data-price="low">
    <span class="tag">🤖 تحليل تمغربيت</span>
    <h3>شقة في القنيطرة</h3>
    <p class="price">780,000 درهم</p>
    <a href="https://wa.me/212649989742" class="btn btn-whatsapp">تواصل</a>
  </div>

  <div class="card" data-type="فيلا" data-price="high">
    <span class="tag">🤖 تحليل تمغربيت</span>
    <h3>فيلا راقية</h3>
    <p class="price">2,400,000 درهم</p>
    <a href="https://wa.me/212649989742" class="btn btn-whatsapp">تواصل</a>
  </div>

</section>

<a class="float-whatsapp" href="https://wa.me/212649989742">💬</a>

<script>

function filter() {
  let type = document.getElementById("type").value;
  let price = document.getElementById("price").value;

  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let show = true;

    if (type && card.dataset.type !== type) show = false;
    if (price && card.dataset.price !== price) show = false;

    card.style.display = show ? "block" : "none";
  });

  alert("تم اقتراح أفضل العقارات حسب اختيارك");
}

</script>

</body>
</html>
