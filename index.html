<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Tamghrabayt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1568605114967-8130f3a36994');
      background-size: cover;
      color: white;
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 40px;
    }

    .hero input {
      padding: 15px;
      width: 60%;
      margin-top: 20px;
      border: none;
      border-radius: 5px;
    }

    .hero button {
      padding: 15px 25px;
      margin-left: 10px;
      background: #000;
      color: white;
      border: none;
      cursor: pointer;
    }

    .section {
      padding: 50px 20px;
      text-align: center;
    }

    .ai-box input {
      padding: 15px;
      width: 60%;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 10px;
      display: inline-block;
      width: 250px;
      border-radius: 10px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .cta {
      background: black;
      color: white;
      padding: 50px;
    }

    a {
      color: white;
      text-decoration: none;
      font-size: 20px;
    }

    @media (max-width: 768px) {
      .hero input, .ai-box input {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <h1>لقّى العقار المناسب فالقنيطرة</h1>
    <p>شراء، بيع، استثمار — بقرارات مبنية على معطيات حقيقية</p>

    <input type="text" placeholder="فين باغي تسكن؟">
    <button>بحث</button>
  </section>

  <!-- AI BOX -->
  <section class="section ai-box">
    <h2>سول الذكاء العقاري</h2>
    <input type="text" id="question" placeholder="واش نشري ولا نكري؟">
    <br><br>
    <button onclick="askAI()">اسول</button>

    <p id="response"></p>
  </section>

  <!-- PROPERTIES -->
  <section class="section">
    <h2>عروض مختارة</h2>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
      <h3>شقة فميموزا</h3>
      <p>850,000 درهم</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be">
      <h3>فيلا فبئر الرامي</h3>
      <p>2,500,000 درهم</p>
    </div>

  </section>

  <!-- INVESTMENT -->
  <section class="section">
    <h2>حلل استثمارك</h2>
    <p>دخل المعطيات وشوف واش مربح</p>
  </section>

  <!-- CTA -->
  <section class="cta">
    <h2>باغي تشري ولا تبيع؟</h2>
    <a href="https://wa.me/+212649989742">تواصل معنا عبر واتساب</a>
  </section>

  <script>
    async function askAI() {
      const question = document.getElementById("question").value;

      const response = await fetch("http://localhost:3000/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ question })
      });

      const data = await response.json();
      document.getElementById("response").innerText = data.answer;
    }
  </script>

</body>
</html>
